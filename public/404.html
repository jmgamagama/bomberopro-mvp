<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="robots" content="noindex" />
    <title>Página no encontrada | BomberoPro</title>
    <style>
      :root {
        color: #1e293b;
        background: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      main {
        width: min(100%, 32rem);
        padding: 2rem;
        text-align: center;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        box-shadow: 0 1rem 3rem rgb(15 23 42 / 10%);
      }

      main:focus-visible {
        outline: 3px solid #4f46e5;
        outline-offset: 4px;
      }

      .code {
        margin: 0;
        color: #4f46e5;
        font-size: 0.875rem;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 0.5rem 0;
        color: #0f172a;
        font-size: clamp(1.75rem, 8vw, 2.5rem);
      }

      .message {
        margin: 0 auto 1.5rem;
        max-width: 27rem;
        color: #475569;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        color: #fff;
        background: #4f46e5;
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        background: #4338ca;
      }

      a:focus-visible {
        outline: 3px solid #818cf8;
        outline-offset: 3px;
      }
    </style>
  </head>
  <body>
    <main id="not-found" tabindex="-1" aria-labelledby="not-found-title">
      <p class="code">ERROR 404</p>
      <h1 id="not-found-title">Página no encontrada</h1>
      <p class="message">
        La dirección que has abierto no existe o ya no está disponible.
      </p>
      <a href="/">Volver al dashboard</a>
    </main>
    <script>
      document.getElementById('not-found').focus();
    </script>
  </body>
</html>
